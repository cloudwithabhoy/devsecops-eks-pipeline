apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: juice-shop
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/<YOUR_GITHUB_USERNAME>/devsecops-eks-pipeline
    targetRevision: main
    path: helm/juice-shop
  destination:
    server: https://kubernetes.default.svc
    namespace: juice-shop
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true