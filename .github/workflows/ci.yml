name: DevSecOps pipeline

on:
  push:
    branches:
      - main
jobs:
  pipeline-info:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: checkout code
        uses: actions/checkout@v4.2.2

      - name: show branch name
        run: echo "Running on branch ${{ github.ref_name }}"

      - name: show commit details
        run: |
          echo "Commit SHA : ${{ github.sha}}"
          echo "Triggered by : ${{ github.actor }}"
          echo "Repository : ${{ github.repository }}"

      - name: List project structuer
        run: ls -la

  secret-scan:
    runs-on: ubuntu-latest
    needs: pipeline-info
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast:
    runs-on: ubuntu-latest
    needs: secret-scan
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  sca:
    runs-on: ubuntu-latest
    needs: sast
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./app
          severity: CRITICAL
          exit-code: 1
          format: table
          ignore-unfixed: true

  iac-scan:
    runs-on: ubuntu-latest
    needs: sca
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          framework: terraform
          soft_fail: false
          output_format: cli

  build-scan-push:
    runs-on: ubuntu-latest
    needs: iac-scan
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Build Docker image
        run: docker build -t juice-shop:${{ github.sha }} ./app

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: juice-shop:${{ github.sha }}
          severity: CRITICAL
          exit-code: 1
          format: table
          ignore-unfixed: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag and push image to ECR
        run: |
          ECR_URL=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com/devsecops-eks-dev
          docker tag juice-shop:${{ github.sha }} $ECR_URL:${{ github.sha }}
          docker push $ECR_URL:${{ github.sha }}

      - name: Update image tag in Helm values
        run: |
          sed -i "s|tag:.*|tag: ${{ github.sha }}|" helm/juice-shop/values.yaml
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add helm/juice-shop/values.yaml
          git commit -m "Update image tag to ${{ github.sha }}"
          git push


